site_name: APRICORE
site_description: A requirements-analysis discipline that turns vague or symptom-laden work items into decision-ready analyses — Analyze, Prioritize, Communicate, Realize.
site_url: https://sebastianmompour-coder.github.io/apricore/
repo_url: https://github.com/sebastianmompour-coder/apricore
repo_name: sebastianmompour-coder/apricore
docs_dir: docs
copyright: "© 2026 Sebastian Mompour"
not_in_nav: |
  privacy.md
  imprint.md
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo-sm.png
  favicon: assets/logo-sm.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/brand.css
plugins:
  - search
  # Social cards (Open Graph / Twitter preview images) are generated in CI only,
  # where image-processing libraries are installed; local builds skip them for speed.
  # Card colors are derived from the theme palette (black background, deep orange accent).
  - social:
      cards: !ENV [CI, false]
      cards_layout_dir: layouts
      cards_layout: apricore
  - privacy
extra:
  analytics:
    provider: google
    property: G-CJH4EWRD8H
  consent:
    title: Cookie consent
    description: >-
      We use cookies to measure the effectiveness of our documentation and
      whether readers find what they are looking for. With your consent, you
      help us make the documentation better.
    actions:
      - accept
      - reject
      - manage
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sebastianmompour-coder/apricore
      name: APRICORE on GitHub
    - icon: material/web
      link: https://www.sebastian-mompour.de
      name: sebastian-mompour.de
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - toc:
      permalink: true
nav:
  - Home: index.md
  - The Framework: spec/01-framework.md
  - Phases:
      - Analyze: spec/02-analyze.md
      - Prioritize: spec/03-prioritize.md
      - Communicate: spec/04-communicate.md
      - Realize: spec/05-realize.md
  - Disciplines: spec/06-disciplines.md
  - Output Schema: spec/07-output-schema.md
  - Prompt Library: prompts/prompt-library.md
  - Examples:
      - Vague ticket: examples/example-1-vague-ticket.md
      - Stakeholder statement: examples/example-2-stakeholder.md
