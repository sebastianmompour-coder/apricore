name: CI
on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against internal/personal references
        run: ./scripts/check-spec.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.sha }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install image-processing system libraries (social cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - run: pip install -r requirements.txt

      # CI is set to "true" by GitHub Actions, so social cards are generated here,
      # which also validates the social plugin configuration. --strict fails the
      # build on broken internal links or nav inconsistencies.
      - name: Strict build
        run: mkdocs build --strict
